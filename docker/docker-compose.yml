services:
  hotel-booking-postgres:
    image: postgres:16-alpine
    container_name: hotel-booking-postgres
    restart: unless-stopped
    env_file:
      - ./db/.env
    ports:
      - "5432:5432"
    volumes:
      - hotel_booking_postgres_data:/var/lib/postgresql/data
      - ./db/migrations/001_create_schema.sql:/docker-entrypoint-initdb.d/01_create_schema.sql:ro
      - ./db/migrations/002_create_indexes.sql:/docker-entrypoint-initdb.d/02_create_indexes.sql:ro
      - ./db/seed/001_seed_hotel_bookings.sql:/docker-entrypoint-initdb.d/03_seed_hotel_bookings.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  hotel_booking_postgres_data:
